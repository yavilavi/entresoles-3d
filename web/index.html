<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartamento 0206-1206 — Modelo 3D fotorrealista</title>
    <style>
        :root { color-scheme: dark; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #15161a; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #app { position: fixed; inset: 0; }
        canvas { display: block; }

        #loading {
            position: fixed; inset: 0; z-index: 30;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 40%, #23252b, #131418);
            color: #e7e9ec; transition: opacity .6s ease; gap: 18px;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading h1 { font-size: 17px; font-weight: 600; letter-spacing: .3px; color: #f1f3f5; }
        #loading p { font-size: 12.5px; color: #9aa0a6; }
        #bar { width: 230px; height: 4px; border-radius: 4px; background: #2c2f36; overflow: hidden; }
        #bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#c4a86a,#e6d2a3); transition: width .2s ease; }

        #hud {
            position: fixed; left: 14px; bottom: 14px; z-index: 20;
            background: rgba(20,21,25,.72); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
            padding: 10px 13px; color: #cfd2d6; font-size: 12px; line-height: 1.5; pointer-events: none;
            max-width: 260px;
        }
        #hud b { color: #e6d2a3; font-weight: 600; }
        #hud .k { background:#2b2e35; border-radius:4px; padding:1px 5px; font-family:monospace; color:#e6d2a3; }
        #title {
            position: fixed; left: 14px; top: 14px; z-index: 20;
            background: rgba(20,21,25,.72); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
            padding: 9px 13px; color: #eceef0; font-size: 13px; font-weight: 600; letter-spacing:.2px;
        }
        #title small { display:block; font-weight: 400; font-size: 11px; color:#9aa0a6; margin-top:2px; }
        #err { position: fixed; inset: 0; z-index: 40; display:none; align-items:center; justify-content:center;
               background:#131418; color:#e7e9ec; font-size:13px; text-align:center; padding:30px; }
    </style>
</head>

<body>
    <div id="app"></div>

    <div id="title">Apartamento 0206-1206<small>Entresoles Ciudad Campestre · modelo 3D fotorrealista</small></div>
    <div id="hud">
        <b>Navegación</b><br>
        Arrastrar: girar · Rueda: zoom<br>
        Clic derecho: desplazar · <span class="k">R</span> reiniciar vista
    </div>

    <div id="loading">
        <h1>Cargando apartamento…</h1>
        <div id="bar"><i></i></div>
        <p id="ldetail">preparando escena</p>
    </div>
    <div id="err"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Reflector.js"></script>

    <script>
        const $ = s => document.querySelector(s);
        const loadingEl = $('#loading'), barEl = $('#bar > i'), detailEl = $('#ldetail');
        function fail(msg) { const e = $('#err'); e.style.display = 'flex'; e.innerHTML = msg; console.error(msg); }

        // ---------- Renderer / scene / camera ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xc7cbd0); // estudio claro (aireado)

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.05, 200);
        const CAM0 = new THREE.Vector3(6.4, 6.0, 9.4);
        const TGT0 = new THREE.Vector3(-0.3, 0.4, -0.2);
        camera.position.copy(CAM0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        // La luz YA está horneada en las texturas (materiales emisivos): sin tone mapping
        // para mostrar el horneado fiel.
        renderer.toneMapping = THREE.NoToneMapping;
        $('#app').appendChild(renderer.domElement);

        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true; orbit.dampingFactor = 0.06;
        orbit.target.copy(TGT0);
        orbit.maxPolarAngle = Math.PI * 0.495;   // no pasar bajo el piso
        orbit.minDistance = 1.2; orbit.maxDistance = 22;

        // ---------- Reflector floor (espejo pulido en vivo bajo el modelo horneado) ----------
        let reflector = null;
        (function buildReflector() {
            try {
                const geo = new THREE.PlaneGeometry(11.5, 7.2);
                const dpr = Math.min(devicePixelRatio || 1, 2);
                reflector = new THREE.Reflector(geo, {
                    clipBias: 0.003,
                    textureWidth: Math.min(Math.floor(innerWidth * dpr), 2048),
                    textureHeight: Math.min(Math.floor(innerHeight * dpr), 2048),
                    color: 0x6d7176
                });
                reflector.rotation.x = -Math.PI / 2;
                reflector.position.set(0.0, 0.012, 0.0);
                scene.add(reflector);
            } catch (e) { console.warn('Reflector no disponible:', e); }
        })();

        // ---------- Load baked GLB ----------
        const loader = new THREE.GLTFLoader();
        loader.load('apartment_baked.glb',
            (gltf) => {
                const model = gltf.scene;
                model.traverse(o => {
                    if (o.isMesh && o.material) {
                        const m = o.material;
                        m.envMapIntensity = 0.0;   // todo es emisivo horneado; sin env que lave
                        if (m.emissiveMap) m.emissiveMap.encoding = THREE.sRGBEncoding;
                        if (m.map) m.map.encoding = THREE.sRGBEncoding;
                        m.needsUpdate = true;
                    }
                });
                scene.add(model);
                detailEl.textContent = 'listo';
                barEl.style.width = '100%';
                setTimeout(() => loadingEl.classList.add('hidden'), 250);
            },
            (xhr) => {
                if (xhr.lengthComputable) {
                    const pct = Math.round(xhr.loaded / xhr.total * 100);
                    barEl.style.width = pct + '%';
                    detailEl.textContent = 'descargando modelo ' + pct + '%';
                } else {
                    detailEl.textContent = 'descargando modelo… ' + (xhr.loaded / 1e6).toFixed(1) + ' MB';
                }
            },
            (e) => fail('No se pudo cargar el modelo 3D.<br><small>' + (e && e.message ? e.message : e) + '</small>')
        );

        // ---------- Interaction ----------
        addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') {
                camera.position.copy(CAM0); orbit.target.copy(TGT0); orbit.update();
            }
        });
        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            if (reflector && reflector.getRenderTarget) {
                const dpr = Math.min(devicePixelRatio || 1, 2);
                reflector.getRenderTarget().setSize(
                    Math.min(Math.floor(innerWidth * dpr), 2048),
                    Math.min(Math.floor(innerHeight * dpr), 2048));
            }
        });

        (function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        })();
    </script>
</body>

</html>
