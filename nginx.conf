server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión (el GLB horneado y el JS se benefician mucho)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/wasm
               model/gltf-binary model/gltf+json image/svg+xml text/css text/plain;

    # SPA-ish: siempre servir index.html si no existe la ruta
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Modelos 3D: MIME correcto + caché agresiva (assets versionados/inmutables)
    location ~* \.glb$ {
        default_type model/gltf-binary;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~* \.gltf$ {
        default_type model/gltf+json;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~* \.(png|jpg|jpeg|webp|hdr|bin|ktx2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Salud para Dokploy / proxies
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
